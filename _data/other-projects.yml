- name: League of Legends Pro Meta Forecasting
  url: https://github.com/danieladeremi/metaforecasting
  code: https://github.com/danieladeremi/metaforecasting
  description: Machine learning system that forecasts champion pick/ban popularity shifts in professional League of Legends. Built an end-to-end data pipeline combining multi-year Tier-1 pro play statistics with balance patch notes, and trained predictive models to estimate next-patch draft trends across regions.
  used:
    - thing: Python
    - thing: PyTorch
    - thing: Pandas
    - thing: Scikit-learn
    - thing: TF-IDF / NLP
    - thing: Oracle’s Elixir Esports Data
    - thing: Riot Patch Notes

- name: Bookmark Sorter (Chrome Extension)
  url: https://github.com/danieladeremi/bookmarksort
  code: https://github.com/danieladeremi/bookmarksort
  description: Chrome extension that analyzes and reorganizes browser bookmarks by website and domain. Traverses the bookmark tree, normalizes domains to account for subdomains and mirror sites, and generates a clean, deterministic folder hierarchy with a preview-first workflow to ensure non-destructive reorganization.
  used:
    - thing: JavaScript
    - thing: Chrome Extensions API (Manifest V3)
    - thing: Bookmark Tree Traversal
    - thing: Domain Normalization
    - thing: UI Preview & Safe Apply Workflow

  
  
