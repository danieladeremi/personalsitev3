    - thing: JavaScript
    - thing: Pyodide (Python in-browser)
    - thing: Python
    - thing: Pandas
    - thing: Elo-based Rating System
    - thing: Oracle’s Elixir Esports Data

- name: ScholarCurio (cf_ai_curio)
  url: https://github.com/danieladeremi/cf_ai_curio
  code: https://github.com/danieladeremi/cf_ai_curio
  description: AI-powered scholarly research assistant built on Cloudflare. Users chat to discover academic papers, retrieve and deduplicate sources from OpenAlex and Crossref, and receive grounded summaries generated with Workers AI and explicit citation guardrails. Implemented persistent session memory and reading-list state using SQLite-backed Durable Objects, plus a responsive web interface for filtering queries and saving papers.
